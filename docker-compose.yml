services:
  mysql:
    image: mysql:8.0
    container_name: chat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chat_system
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/migration:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+8:00

  coturn:
    image: coturn/coturn:4.6-alpine
    container_name: chat-coturn
    network_mode: host
    environment:
      TZ: Asia/Shanghai
    command: |
      -n --log-file=stdout
      --listening-port=3478
      --min-port=49152
      --max-port=65535
      --fingerprint
      --lt-cred-mech
      --user=chat:chat-turn-password
      --realm=ncu-chat
      --no-cli
    restart: unless-stopped

  app:
    build: .
    container_name: chat-app
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - ./application.yml:/app/config/application.yml
      - uploads:/app/uploads
    depends_on:
      - mysql

volumes:
  mysql-data:
  uploads:
