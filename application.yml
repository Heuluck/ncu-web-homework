server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript
    min-response-size: 1024
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 200
    accept-count: 50

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/chat_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&cachePrepStmts=true&useServerPrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 600000
      pool-name: ChatHikariCP
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: your-256-bit-secret-key-here-change-in-production-ncu-chat-2026
  expiration: 86400000

file:
  upload:
    path: ./uploads
    max-size: 50MB
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,txt,mp3,wav,webm

bot:
  encryption:
    secret: ncu-chat-bot-aes-256-secret-key-2026
  rate-limit:
    min-interval-ms: 3000
    max-per-group-per-minute: 10
  context:
    max-messages: 20
    max-chars-per-message: 200
