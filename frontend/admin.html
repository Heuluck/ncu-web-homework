<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - NCU Chat</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="admin-layout">
  <!-- 侧边导航 -->
  <aside class="admin-sidebar">
    <div class="admin-logo">⚙️ 管理后台</div>
    <nav class="admin-nav">
      <button class="admin-nav-item active" data-panel="users">
        <i data-lucide="users"></i> 用户管理
      </button>
      <button class="admin-nav-item" data-panel="groups">
        <i data-lucide="message-square"></i> 群聊管理
      </button>
      <button class="admin-nav-item" data-panel="announcements">
        <i data-lucide="megaphone"></i> 系统公告
      </button>
      <button class="admin-nav-item" data-panel="sensitive">
        <i data-lucide="shield-alert"></i> 敏感词管理
      </button>
    </nav>
    <a href="/index.html" class="admin-back" style="margin-top:auto;">
      <i data-lucide="arrow-left"></i> 返回聊天
    </a>
  </aside>

  <!-- 主内容区 -->
  <main class="admin-main" id="admin-main">
    <div class="admin-header">
      <h2 id="panel-title">用户管理</h2>
    </div>
    <div id="panel-content"></div>
  </main>
</div>

<!-- 通用模态框 -->
<div id="admin-modal-overlay" class="admin-modal-overlay" style="display:none">
  <div class="admin-modal" id="admin-modal-content"></div>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/admin.js"></script>
<script>
  // 点击遮罩关闭管理模态框
  document.getElementById('admin-modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) AdminApp._closeModal();
  });
  (function() {
    if (!Auth.isLoggedIn()) {
      window.location.href = '/login.html';
      return;
    }
    const user = Auth.getUser();
    if (user.role !== 1) {
      Utils.showToast('无权访问管理后台', 'error');
      setTimeout(() => window.location.href = '/index.html', 1500);
      return;
    }
    AdminApp.init();
    lucide.createIcons();
  })();
</script>
</body>
</html>
