<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线聊天系统</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 模态框样式 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 200ms var(--ease-out) both;
    }
    .modal-container {
      background: var(--bg-app);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: scaleIn 250ms var(--ease-out) both;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--border-subtle);
    }
    .modal-header h3 {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
    }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-6);
      border-top: 1px solid var(--border-subtle);
    }
    .form-group {
      margin-bottom: var(--space-5);
    }
    .form-label {
      display: block;
      margin-bottom: var(--space-2);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text-main);
    }
    .friend-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      cursor: pointer;
      transition: background var(--transition-fast);
      border-bottom: 1px solid var(--border-subtle);
    }
    .friend-item:hover {
      background: var(--bg-surface-hover);
    }
    .friend-item.selected {
      background: var(--bg-surface);
    }
    .friend-name {
      flex: 1;
      font-size: var(--text-sm);
    }
    .friend-checkbox {
      color: var(--slate-400);
    }
    .friend-item.selected .friend-checkbox {
      color: var(--color-primary);
    }
    .friend-list-container {
      max-height: 250px;
      overflow-y: auto;
    }
    .selected-friends {
      margin-top: var(--space-3);
    }
    .selected-label {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-bottom: var(--space-2);
    }
    .selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .selected-tag {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      background: var(--bg-surface);
      border-radius: var(--radius-full);
      font-size: var(--text-sm);
    }
    .selected-tag i {
      width: 14px;
      height: 14px;
      cursor: pointer;
      color: var(--text-muted);
    }
    .selected-tag i:hover {
      color: var(--color-danger);
    }
    .settings-section {
      margin-bottom: var(--space-6);
      padding-bottom: var(--space-6);
      border-bottom: 1px solid var(--border-subtle);
    }
    .settings-section:last-child {
      border-bottom: none;
    }
    .section-title {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      margin-bottom: var(--space-3);
      color: var(--text-main);
    }
    .danger-zone {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-top: var(--space-4);
    }
    .btn-danger {
      background: var(--color-danger);
      color: white;
    }
    .btn-danger:hover {
      background: var(--color-danger-hover);
    }
    .member-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3);
      border-bottom: 1px solid var(--border-subtle);
    }
    .member-info {
      flex: 1;
    }
    .member-name {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
    }
    .member-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      background: var(--bg-surface-hover);
      margin-left: var(--space-2);
    }
    .member-role {
      font-size: 11px;
      color: var(--text-muted);
    }
    .role-owner {
      color: #f59e0b;
    }
    .role-admin {
      color: var(--color-primary);
    }
    .member-actions {
      display: flex;
      gap: var(--space-1);
    }
    .btn-sm {
      height: 32px;
      padding: 0 var(--space-3);
      font-size: var(--text-xs);
    }
    .member-search {
      margin-bottom: var(--space-4);
    }
    .create-group-btn {
      margin-bottom: var(--space-3);
    }
    /* 右键菜单样式 */
    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-main);
      transition: background var(--transition-fast);
    }
    .context-menu-item:hover {
      background: var(--bg-surface-hover);
    }
    .context-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 4px 0;
    }
    .list-item.blocked {
      opacity: 0.6;
    }
    /* AI 机器人卡片 */
    .bot-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-2);
      border-bottom: 1px solid var(--border-subtle);
      transition: background var(--transition-fast);
    }
    .bot-card:last-child { border-bottom: none; }
    .bot-card:hover { background: var(--bg-surface-hover); }
    .bot-card-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex: 1;
      min-width: 0;
    }
    .bot-card-info { flex: 1; min-width: 0; }
    .bot-card-name {
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bot-card-meta {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 2px;
    }
    .bot-card-right { flex-shrink: 0; }
    .bot-form { display: flex; flex-direction: column; gap: 0; }
    .bot-form .form-group { margin-bottom: var(--space-4); }
    .bot-advanced-settings summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--text-muted);
      font-size: var(--text-sm);
      padding: var(--space-2) 0;
    }
    .bot-advanced-settings summary::-webkit-details-marker { display: none; }
    .bot-advanced-settings[open] summary { margin-bottom: var(--space-2); }
    .text-danger { color: var(--color-danger); }
    .text-muted { color: var(--text-muted); }
    /* 机器人消息气泡样式 */
    .message.message-bot .message-bubble {
      background: linear-gradient(135deg, #f0f7ff 0%, #e8f4fd 100%);
      border: 1px solid #d0e3f7;
    }
    .message.message-bot .message-sender {
      color: var(--color-primary);
      font-weight: var(--font-semibold);
    }
    /* @提及弹出框 */
    .announcement-bar {
      padding: var(--space-2) var(--space-5);
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border-subtle);
    }
    .announcement-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-primary);
      transition: background 150ms;
    }
    .announcement-header:hover {
      background: var(--bg-surface-hover);
    }
    .announcement-count {
      font-size: 11px;
      background: var(--color-primary);
      color: white;
      border-radius: 10px;
      padding: 0 6px;
      line-height: 18px;
    }
    .announcement-body {
      max-height: 200px;
      overflow-y: auto;
      padding: 0 16px 8px;
    }
    .announcement-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
    }
    .announcement-item:last-child {
      border-bottom: none;
    }
    .announcement-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 2px;
    }
    .announcement-item-time {
      font-size: 11px;
      color: var(--text-muted);
    }
    .announcement-detail-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 200ms var(--ease-out) both;
    }
    .announcement-detail-overlay.closing {
      animation: fadeOut 200ms var(--ease-out) forwards;
      pointer-events: none;
    }
    .announcement-detail-overlay.closing .announcement-detail-box {
      animation: scaleOut 200ms var(--ease-out) forwards;
    }
    .announcement-detail-box {
      background: var(--bg-app);
      border-radius: var(--radius-2xl);
      box-shadow: var(--shadow-lg);
      width: 90%;
      max-width: 480px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: scaleIn 250ms var(--ease-out) both;
    }
    .announcement-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .announcement-detail-header h3 {
      font-size: 16px;
      margin: 0;
    }
    .announcement-detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-main);
      white-space: pre-wrap;
    }
    .announcement-detail-time {
      padding: 12px 20px;
      border-top: 1px solid var(--border-subtle);
      font-size: 12px;
      color: var(--text-muted);
    }

    .at-mention-popup {
      position: absolute;
      bottom: 100%;
      left: 16px;
      right: 16px;
      max-height: 200px;
      overflow-y: auto;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      z-index: 100;
      margin-bottom: 4px;
    }
    .at-mention-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      cursor: pointer;
      transition: background var(--transition-fast);
      font-size: var(--text-sm);
    }
    .at-mention-item:hover,
    .at-mention-item.active {
      background: var(--bg-surface-hover);
    }
    .at-mention-item .avatar { width: 24px; height: 24px; }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="app-layout">
  <!-- 侧边栏 -->
  <aside class="app-sidebar">
    <!-- 用户信息头部 -->
    <div class="sidebar-header">
      <div class="sidebar-profile" onclick="toggleProfileDropdown(this, event)">
        <div class="avatar-wrapper">
          <img id="myAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="头像" class="avatar avatar-sm">
          <span id="myStatus" class="status-indicator online"></span>
        </div>
        <div class="sidebar-profile-info">
          <span id="myName" class="sidebar-profile-name">用户名</span>
          <span id="mySignature" class="sidebar-profile-signature"></span>
        </div>
        <div class="dropdown">
          <button class="btn-icon" onclick="toggleDropdown(this, event)">
            <i data-lucide="chevron-down" style="width: 16px; height: 16px;"></i>
          </button>
          <div class="dropdown-menu">
            <div class="dropdown-item" onclick="openProfileModal()">
              <i data-lucide="user" style="width: 16px; height: 16px;"></i>
              个人资料
            </div>
            <div class="dropdown-item admin-only" onclick="location.href='/admin.html'" style="display:none;">
              <i data-lucide="shield" style="width: 16px; height: 16px;"></i>
              管理后台
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" onclick="Auth.logout()">
              <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
              退出登录
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 公告栏 -->
    <div id="announcementBar" class="announcement-bar" style="display:none;">
      <div class="announcement-header" onclick="toggleAnnouncement()">
        <i data-lucide="megaphone" style="width:14px;height:14px;"></i>
        <span class="announcement-title-text">系统公告</span>
        <span class="announcement-count" id="announcementCount"></span>
        <i data-lucide="chevron-down" id="announcementArrow" style="width:14px;height:14px;transition:transform 200ms;"></i>
      </div>
      <div class="announcement-body" id="announcementBody" style="display:none;"></div>
    </div>

    <!-- 搜索栏 -->
    <div class="sidebar-search">
      <div class="search-wrapper">
        <i data-lucide="search" style="width: 16px; height: 16px;"></i>
        <input type="text" class="input-control" placeholder="搜索联系人或群组...">
      </div>
    </div>

    <!-- 标签页导航 -->
    <div class="sidebar-nav">
      <div class="nav-item active" data-tab="recent" style="display:inline-flex;align-items:center;gap:4px;">最近<span class="badge" id="recentUnreadBadge" style="display:none;"></span></div>
      <div class="nav-item" data-tab="friends" style="display:inline-flex;align-items:center;gap:4px;">好友<span class="badge" id="friendRequestBadge" style="display:none;"></span></div>
      <div class="nav-item" data-tab="groups">群聊</div>
    </div>

    <!-- 列表内容区 -->
    <div class="sidebar-content" id="sidebarContent">
      <!-- 会话列表 -->
      <div id="conversationList" class="tab-content active">
        <div class="list-group-title">加载中...</div>
      </div>

      <!-- 好友列表（D负责） -->
      <div id="friendList" class="tab-content" style="display: none;">
        <div class="list-group-title">我的好友</div>
      </div>

      <!-- 群聊列表（C负责） -->
      <div id="groupList" class="tab-content" style="display: none;">
        <div class="create-group-btn" style="padding: 12px;">
          <button class="btn btn-primary btn-sm" id="createGroupBtn" style="width: 100%;">
            <i data-lucide="plus" style="width: 14px; height: 14px;"></i> 创建群聊
          </button>
        </div>
        <div id="groupListContainer"></div>
      </div>
    </div>
  </aside>

  <!-- 移动端侧边栏遮罩 -->
  <div class="sidebar-backdrop" onclick="hideMobileSidebar()"></div>

  <!-- 聊天区域 -->
  <main class="chat-area">
    <!-- 聊天头部 -->
    <div class="chat-header" id="chatHeader" style="display: none;">
      <div class="chat-header-info">
        <button class="btn-icon mobile-back-btn" onclick="showMobileSidebar()">
          <i data-lucide="arrow-left"></i>
        </button>
        <div class="avatar-wrapper">
          <img id="chatAvatar" src="" alt="" class="avatar avatar-md">
          <span id="chatStatus" class="status-indicator"></span>
        </div>
        <div class="chat-header-details">
          <span id="chatName" class="chat-header-name"></span>
          <span id="chatStatusText" class="chat-header-status"></span>
        </div>
      </div>
      <div class="chat-header-actions">
        <!-- 免打扰按钮 -->
        <button class="btn-icon" id="muteBtn" title="消息免打扰" onclick="ConversationManager.toggleMute(ConversationManager.currentConvType(), ConversationManager.currentConvId()); ConversationManager.refreshMuteBtn();" style="display: none;">
          <i data-lucide="bell"></i>
        </button>
        <!-- 群聊专用按钮 -->
        <button class="btn-icon" id="groupMembersBtn" title="群成员" style="display: none;">
          <i data-lucide="users"></i>
        </button>
        <button class="btn-icon" id="groupSettingsBtn" title="群设置" style="display: none;">
          <i data-lucide="settings"></i>
        </button>
        <button class="btn-icon" id="chatHistoryBtn" title="聊天记录">
          <i data-lucide="message-square"></i>
        </button>
        <button class="btn-icon" id="voiceCallBtn" title="语音通话">
          <i data-lucide="phone"></i>
        </button>
        <button class="btn-icon" id="chatMoreBtn" title="更多">
          <i data-lucide="more-vertical"></i>
        </button>
      </div>
    </div>

    <!-- 消息区域 -->
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state">
        <div class="empty-state-icon">
          <i data-lucide="message-square" style="width: 64px; height: 64px;"></i>
        </div>
        <div class="empty-state-title">选择一个会话开始聊天</div>
        <div class="empty-state-text">从左侧列表选择联系人或群组</div>
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="chat-input-area" id="chatInputArea" style="display: none;">
      <div class="chat-input-toolbar" style="position: relative;">
        <button class="btn-icon" title="表情" id="emojiBtn">
          <i data-lucide="smile"></i>
        </button>
        <button class="btn-icon" title="图片">
          <i data-lucide="image"></i>
        </button>
        <button class="btn-icon" title="文件">
          <i data-lucide="paperclip"></i>
        </button>
        <button class="btn-icon" title="语音" onclick="VoiceManager.toggleRecording()">
          <i data-lucide="mic"></i>
        </button>
        <!-- 表情选择器容器（在工具栏内绝对定位） -->
        <div id="emojiPicker" class="emoji-picker-container"></div>
      </div>
      <div class="chat-input-box">
        <textarea id="messageInput" class="chat-input-field" placeholder="输入消息..." rows="1"></textarea>
        <button id="sendBtn" class="btn btn-primary chat-send-btn">
          <i data-lucide="send" style="width: 16px; height: 16px;"></i>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- 聊天记录弹窗（左右结构） -->
<div class="chat-history-modal" id="chatHistoryModal">
  <div class="chat-history-modal-overlay" onclick="toggleChatHistoryModal()"></div>
  <div class="chat-history-modal-content">
    <div class="chat-history-modal-header">
      <h3>聊天记录</h3>
      <button class="btn-icon" onclick="toggleChatHistoryModal()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="chat-history-modal-body">
      <!-- 左侧面板：搜索和筛选 -->
      <div class="chat-history-sidebar">
        <div class="chat-history-search">
          <input type="text" class="chat-history-input" id="historyKeyword" placeholder="搜索聊天记录...">
        </div>
        <div class="chat-history-filters">
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:12px;color:var(--text-muted);font-weight:500;">开始日期</label>
            <input type="date" class="chat-history-input" id="historyStartDate">
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;">
            <label style="font-size:12px;color:var(--text-muted);font-weight:500;">结束日期</label>
            <input type="date" class="chat-history-input" id="historyEndDate">
          </div>
        </div>
        <div class="chat-history-actions">
          <button class="btn btn-primary btn-sm" onclick="searchChatHistory()" style="width:100%;">
            <i data-lucide="search"></i> 搜索
          </button>
          <button class="btn btn-ghost btn-sm" onclick="resetChatHistorySearch()" style="width:100%;">
            <i data-lucide="refresh-cw"></i> 重置
          </button>
        </div>
        <div class="chat-history-export">
          <span style="font-size:var(--text-sm);color:var(--text-muted);margin-bottom:4px;display:block;">导出：</span>
          <button class="btn btn-secondary btn-sm" onclick="exportChatHistory('txt')" style="width:100%;">
            <i data-lucide="file-text"></i> TXT
          </button>
          <button class="btn btn-secondary btn-sm" onclick="exportChatHistory('csv')" style="width:100%;margin-top:6px;">
            <i data-lucide="file-spreadsheet"></i> CSV
          </button>
        </div>
      </div>
      <!-- 右侧面板：消息列表 -->
      <div class="chat-history-main">
        <div class="chat-history-messages" id="chatHistoryMessages">
          <div class="chat-history-empty">
            <i data-lucide="message-square" style="width: 48px; height: 48px; color: var(--slate-300);"></i>
            <p>点击搜索按钮查看聊天记录</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 粘贴图片确认模态框 -->
<div id="pasteImageModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
  <div id="pasteImageOverlay" style="position:absolute; top:0; left:0; right:0; bottom:0;"></div>
  <div style="position:relative; background:var(--bg-app); border-radius:var(--radius-2xl); box-shadow:var(--shadow-lg); width:90%; max-width:400px; overflow:hidden; animation:scaleIn 200ms var(--ease-out);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:var(--space-4) var(--space-5); border-bottom:1px solid var(--border-subtle);">
      <h3 style="font-size:var(--text-lg); font-weight:var(--font-semibold); margin:0;">发送图片</h3>
      <button class="btn-icon" onclick="closePasteImageModal()" style="cursor:pointer;">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div style="padding:var(--space-5); text-align:center;">
      <img id="pasteImagePreview" src="" alt="预览" style="max-width:100%; max-height:300px; border-radius:var(--radius-lg); object-fit:contain;">
      <p id="pasteImageSize" style="margin-top:var(--space-3); font-size:var(--text-sm); color:var(--text-muted);"></p>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:var(--space-3); padding:var(--space-4) var(--space-5); border-top:1px solid var(--border-subtle);">
      <button id="pasteImageCancel" class="btn btn-ghost">取消</button>
      <button id="pasteImageConfirm" class="btn btn-primary">发送</button>
    </div>
  </div>
</div>

<!-- 个人资料模态框（取代独立页面，共享 WebSocket 避免断开导致离线） -->
<div id="profileModal" class="modal-overlay" style="display:none;">
  <div class="modal-container" style="max-width: 480px; max-height: 90vh; overflow-y: auto;">
    <div class="modal-header">
      <h3>个人资料</h3>
      <button class="btn-icon" onclick="closeProfileModal()">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div class="modal-body">
      <!-- 头像 -->
      <div class="profile-avatar-section" style="margin-bottom: var(--space-6);">
        <div class="profile-avatar-wrapper" onclick="document.getElementById('pmAvatarInput').click()">
          <img id="pmAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="头像" class="avatar avatar-xl">
          <span id="pmStatusDot" class="status-indicator online" style="width:16px;height:16px;bottom:4px;right:4px;"></span>
          <div class="profile-avatar-overlay">
            <i data-lucide="camera" style="width: 24px; height: 24px;"></i>
          </div>
        </div>
        <input type="file" id="pmAvatarInput" accept="image/*" style="display:none;" onchange="uploadProfileAvatar(this)">
        <span class="text-muted text-sm">点击更换头像</span>
      </div>

      <!-- 资料表单 -->
      <form id="pmForm" class="profile-form" onsubmit="saveProfile(event)">
        <div class="input-group">
          <label class="input-label">用户名</label>
          <input type="text" id="pmUsername" class="input-control" disabled>
        </div>
        <div class="input-group">
          <label class="input-label">昵称</label>
          <input type="text" id="pmNickname" class="input-control" placeholder="设置昵称">
        </div>
        <div class="input-group">
          <label class="input-label">个性签名</label>
          <input type="text" id="pmSignature" class="input-control" placeholder="写点什么...">
        </div>
        <div class="input-group">
          <label class="input-label">在线状态</label>
          <select id="pmStatus" class="input-control" autocomplete="off" onchange="updateProfileStatusDot(parseInt(this.value))">
            <option value="1">在线</option>
            <option value="2">忙碌</option>
            <option value="3">勿扰</option>
            <option value="0">离线</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">保存修改</button>
      </form>

      <!-- 修改密码 -->
      <div class="profile-section" style="margin-top: var(--space-6);">
        <h3 class="profile-section-title">修改密码</h3>
        <form id="pmPasswordForm" onsubmit="changeProfilePassword(event)" style="display:flex;flex-direction:column;gap:var(--space-4);">
          <div class="input-group">
            <label class="input-label">原密码</label>
            <input type="password" id="pmOldPassword" class="input-control" placeholder="输入原密码" required>
          </div>
          <div class="input-group">
            <label class="input-label">新密码</label>
            <input type="password" id="pmNewPassword" class="input-control" placeholder="至少6位，包含字母和数字" required>
          </div>
          <button type="submit" class="btn btn-secondary">修改密码</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- SockJS + STOMP.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/websocket.js"></script>
<script src="js/components/chat-header.js"></script>
<script src="js/conversation.js"></script>
<script src="js/chat.js"></script>
<script src="js/group.js"></script>
<script src="js/emoji.js"></script>
<script src="js/friend.js"></script>
<script src="js/voice.js"></script>
<script src="js/call.js"></script>
<script src="js/components/create-group-modal.js"></script>
<script src="js/components/group-member-panel.js"></script>
<script src="js/components/group-settings-modal.js"></script>
<script src="js/components/group-invite-modal.js"></script>
<script src="js/bot.js"></script>
<script src="js/components/bot-modal.js"></script>

<script>
  // 认证检查
  if (!Auth.checkAuth()) location.href = '/login.html';

  // 先拿缓存数据快速渲染（避免 WebSocket 还没连上时显示离线）
  function renderMyProfile(u) {
    document.getElementById('myName').textContent = u?.nickname || u?.username || '用户';
    if (u?.signature) document.getElementById('mySignature').textContent = u.signature;
    if (u?.avatar) document.getElementById('myAvatar').src = u.avatar;
    const statusDot = document.getElementById('myStatus');
    if (statusDot && u?.status !== undefined) {
      statusDot.className = 'status-indicator';
      if (u.status === 1) statusDot.classList.add('online');
      else if (u.status === 2) statusDot.classList.add('busy');
      else if (u.status === 3) statusDot.classList.add('dnd');
      // 状态 0 无需额外类名，默认为灰色离线点
    }
    if (u?.role === 1) {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    }
  }
  renderMyProfile(Auth.getUser());

  // 后台拉最新数据（只更新非状态字段，状态靠 WebSocket 同步）
  async function loadMyProfile() {
    const result = await API.get('/api/user/profile');
    if (result?.code === 200) {
      const u = result.data;
      const cached = Auth.getUser();
      // 合并：保留缓存中的最新状态，避免 API 读到 WebSocket 还没连上的值
      const merged = { ...u, status: cached?.status ?? u.status };
      Auth.setUser(merged);
      renderMyProfile(merged);
    }
  }
  loadMyProfile();
  loadMyProfile();

  lucide.createIcons();

  // ===== 公告加载 =====
  async function loadAnnouncements() {
    try {
      const res = await API.get('/api/announcements?pageNum=1&pageSize=10');
      if (res?.code !== 200 || !res.data?.records?.length) return;
      const records = res.data.records;
      const bar = document.getElementById('announcementBar');
      const body = document.getElementById('announcementBody');
      const count = document.getElementById('announcementCount');
      count.textContent = records.length;
      body.innerHTML = records.map(a => `
        <div class="announcement-item" onclick="showAnnouncementDetail(${JSON.stringify(a).replace(/"/g, '&quot;')})">
          <div class="announcement-item-title">${Utils.escapeHtml(a.title)}</div>
          <div class="announcement-item-time">${Utils.formatTime(a.updateTime || a.createTime)}</div>
        </div>
      `).join('');
      bar.style.display = '';
      lucide.createIcons();
    } catch (e) {
      console.error('加载公告失败:', e);
    }
  }
  loadAnnouncements();

  // ===== WebSocket 初始化 =====
  WebSocketManager.onMessage((data) => {
    if (data.type === 'ERROR') {
      // 敏感词拦截等错误提示
      Utils.showToast(data.message || '消息发送失败', 'error');
      // 回退输入框内容
      if (ChatManager._lastSentText) {
        const input = document.getElementById('messageInput');
        if (input) {
          input.value = ChatManager._lastSentText;
          input.focus();
        }
        ChatManager._lastSentText = '';
      }
    } else if (data.type === 'READ_RECEIPT') {
      ChatManager.receiveReadReceipt(data.friendId);
    } else {
      ChatManager.receiveMessage(data);
    }
  });

  WebSocketManager.onStatusChange((data) => {
    // 1. 更新会话列表缓存（ConversationManager）
    ConversationManager.updateOnlineStatus(data.userId, data.status);
    // 2. 更新好友列表缓存（FriendManager），确保聊天头部能读到最新状态
    if (typeof FriendManager !== 'undefined') {
      FriendManager.updateOnlineStatus(data.userId, data.status);
    }
    // 3. 更新自己的状态指示点
    const myId = Auth.getUserId();
    if (data.userId === myId) {
      const dot = document.getElementById('myStatus');
      if (dot) {
        dot.className = 'status-indicator';
        if (data.status === 1) dot.classList.add('online');
        else if (data.status === 2) dot.classList.add('busy');
        else if (data.status === 3) dot.classList.add('dnd');
      }
      Auth.setUser({ ...Auth.getUser(), status: data.status });
      // 如果个人资料模态框打开中，同步更新
      const pmStatus = document.getElementById('pmStatus');
      if (pmStatus && document.getElementById('profileModal').style.display !== 'none') {
        pmStatus.value = data.status;
        updateProfileStatusDot(data.status);
      }
    }
  });

  // 群聊消息监听
  WebSocketManager.onGroupMessage((data) => {
    GroupManager.receiveGroupMessage(data);
  });

  // 语音消息监听（带去重，防止 WebSocket 重复推送导致未读计数翻倍）
  const _voiceMsgIds = new Set();
  WebSocketManager.onVoiceMessage((data) => {
    // 去重：VoiceMessageVO.id 来自 voice_message 表
    if (data.id && _voiceMsgIds.has(data.id)) return;
    if (data.id) _voiceMsgIds.add(data.id);
    // 适配语音消息为聊天消息格式，确保渲染引擎识别
    data.messageType = 3;
    data.content = data.fileUrl || '';
    data.status = 1;
    // 注意：ConversationManager.addOrUpdateConversation 由 ChatManager.receiveMessage 统一处理，
    // 此处不重复调用，避免未读计数翻倍
    if (data.groupId) {
      GroupManager.receiveGroupMessage(data);
    } else {
      ChatManager.receiveMessage(data);
    }
  });

  // 好友申请实时通知（WebSocket 推送）
  WebSocketManager.onFriendRequest((data) => {
    if (typeof FriendManager !== 'undefined') {
      FriendManager.onNewFriendRequest(data);
    }
  });

  WebSocketManager.connect();

  // WebSocket 断开时，立即将所有状态切为离线（仅改 DOM，不污染 Auth 缓存）
  WebSocketManager.onDisconnected(() => {
    // 1. 自己的状态指示器
    const dot = document.getElementById('myStatus');
    if (dot) dot.className = 'status-indicator offline';
    // 2. 所有好友列表状态 → 离线
    if (typeof FriendManager !== 'undefined' && FriendManager.groups) {
      for (const group of FriendManager.groups) {
        for (const friend of (group.friends || [])) {
          friend.onlineStatus = 0;
        }
      }
      FriendManager.renderFriendList();
    }
    // 3. 所有私聊会话状态 → 离线
    ConversationManager.conversations.forEach(c => {
      if (c._type === 'private') c.onlineStatus = 0;
    });
    ConversationManager.renderList();
    // 4. 如果正在私聊，刷新聊天头部状态
    if (ChatManager.currentFriendId && ChatManager.currentFriendInfo) {
      ChatManager.currentFriendInfo.onlineStatus = 0;
      ChatManager._renderHeader();
    }
  });

  // ===== 个人资料模态框（共享 WebSocket，不再跳独立页面导致断开） =====
  let _pmCurrentAvatar = '';

  function openProfileModal() {
    const modal = document.getElementById('profileModal');
    if (!modal) return;
    modal.style.display = 'flex';
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
    _loadProfileModalData();
    lucide.createIcons({ nodes: [modal] });
  }

  function closeProfileModal() {
    document.getElementById('profileModal').style.display = 'none';
  }

  // 点击遮罩关闭
  document.getElementById('profileModal')?.addEventListener('click', function(e) {
    if (e.target === this) closeProfileModal();
  });

  async function _loadProfileModalData() {
    // 先用缓存数据快速填充
    const cached = Auth.getUser();
    if (cached) {
      document.getElementById('pmNickname').value = cached.nickname || '';
      document.getElementById('pmSignature').value = cached.signature || '';
      document.getElementById('pmStatus').value = cached.status ?? 1;
      updateProfileStatusDot(cached.status ?? 1);
      if (cached.avatar) {
        document.getElementById('pmAvatar').src = cached.avatar;
        _pmCurrentAvatar = cached.avatar;
      }
    }

    // 再从 API 获取最新数据
    const result = await API.get('/api/user/profile');
    if (result && result.code === 200) {
      const user = result.data;
      document.getElementById('pmUsername').value = user.username;
      document.getElementById('pmNickname').value = user.nickname || '';
      document.getElementById('pmSignature').value = user.signature || '';
      document.getElementById('pmStatus').value = user.status ?? 1;
      updateProfileStatusDot(user.status ?? 1);
      if (user.avatar) {
        document.getElementById('pmAvatar').src = user.avatar;
        _pmCurrentAvatar = user.avatar;
      }
    }
  }

  function updateProfileStatusDot(status) {
    const dot = document.getElementById('pmStatusDot');
    if (!dot) return;
    dot.className = 'status-indicator';
    if (status === 1) dot.classList.add('online');
    else if (status === 2) dot.classList.add('busy');
    else if (status === 3) dot.classList.add('dnd');
  }

  async function uploadProfileAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    const result = await API.upload(file);
    if (result && result.code === 200) {
      _pmCurrentAvatar = result.data.url;
      document.getElementById('pmAvatar').src = _pmCurrentAvatar;
    }
  }

  async function saveProfile(e) {
    e.preventDefault();
    const status = parseInt(document.getElementById('pmStatus').value);
    const result = await API.put('/api/user/profile', {
      nickname: document.getElementById('pmNickname').value,
      signature: document.getElementById('pmSignature').value,
      avatar: _pmCurrentAvatar,
      status: status
    });
    if (result && result.code === 200) {
      Auth.setUser(result.data);
      renderMyProfile(result.data);
      updateProfileStatusDot(status);
      Utils.showToast('保存成功', 'success');
    } else {
      Utils.showToast(result?.message || '保存失败', 'error');
    }
  }

  async function changeProfilePassword(e) {
    e.preventDefault();
    const oldPwd = document.getElementById('pmOldPassword').value;
    const newPwd = document.getElementById('pmNewPassword').value;
    const result = await API.put('/api/user/password', { oldPassword: oldPwd, newPassword: newPwd });
    if (result && result.code === 200) {
      Utils.showToast('密码修改成功', 'success');
      document.getElementById('pmOldPassword').value = '';
      document.getElementById('pmNewPassword').value = '';
    } else {
      Utils.showToast(result?.message || '修改失败', 'error');
    }
  }

  // WebSocket 断开时同步更新模态框
  WebSocketManager.onDisconnected(() => {
    const pmStatus = document.getElementById('pmStatus');
    if (pmStatus) pmStatus.value = 0;
    updateProfileStatusDot(0);
  });

  ConversationManager.loadConversations();
  // 启动时加载好友数据（供聊天头部菜单使用）+ 检查待处理申请
  if (typeof FriendManager !== 'undefined') {
    FriendManager.loadFriends();
    FriendManager.checkPendingRequests();
  }

  // ===== 页面聚焦时补发已读标记 =====
  function handlePageFocus() {
    if (ChatManager._pendingReadFriendId) {
      ChatManager._markAsRead(ChatManager._pendingReadFriendId);
      ChatManager._pendingReadFriendId = null;
    }
    if (typeof GroupManager !== 'undefined' && GroupManager._pendingReadGroupId) {
      GroupManager._markGroupRead(GroupManager._pendingReadGroupId);
      GroupManager._pendingReadGroupId = null;
    }
  }
  window.addEventListener('focus', handlePageFocus);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) handlePageFocus();
  });

  // ===== 初始化表情选择器 =====
  EmojiPicker.init();

  // ===== 表情按钮事件 =====
  const emojiBtn = document.getElementById('emojiBtn');
  const emojiPickerContainer = document.getElementById('emojiPicker');

  if (emojiBtn && emojiPickerContainer) {
    emojiBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      EmojiPicker.show('emojiPicker', (emojiName, emojiChar) => {
        console.log('[表情] 选择表情:', emojiName, emojiChar);
        
        if (GroupManager.currentGroupId) {
          // 群聊：HTTP API（后端会自动广播 WebSocket）
          const token = Auth.getToken();
          fetch('/api/group/message/send', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
              content: emojiName,
              messageType: 1,
              fileUrl: emojiChar,
              groupId: GroupManager.currentGroupId
            })
          }).then(res => res.json())
            .then(data => console.log('[表情] 发送结果:', data))
            .catch(err => console.error('[表情] 发送失败:', err));
        } else if (ChatManager.currentFriendId) {
          // 私聊：通过 WebSocket 发送（与文字消息一致，确保实时广播）
          ChatManager.sendMessage(emojiName, 1, emojiChar);
        } else {
          Utils.showToast('请先选择一个聊天对象', 'warning');
          return;
        }
        
        // 关闭表情选择器
        emojiPickerContainer.classList.remove('active');
      });
    });
  }

  // ===== 标签页切换 =====
  document.querySelectorAll('.nav-item').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const tabName = tab.dataset.tab;
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      if (tabName === 'recent') {
        document.getElementById('conversationList').style.display = 'block';
        ConversationManager.loadConversations();
      } else if (tabName === 'friends') {
        document.getElementById('friendList').style.display = 'block';
        if (typeof FriendManager !== 'undefined') FriendManager.loadFriends();
      } else if (tabName === 'groups') {
        document.getElementById('groupList').style.display = 'block';
        GroupManager.loadMyGroups();
      }
    });
  });

  // ===== 群聊按钮事件 =====
  document.getElementById('createGroupBtn')?.addEventListener('click', () => {
    if (typeof CreateGroupModal !== 'undefined') {
      CreateGroupModal.show();
    } else {
      Utils.showToast('功能加载中', 'warning');
    }
  });

  document.getElementById('groupMembersBtn')?.addEventListener('click', () => {
    if (GroupManager.currentGroupId) {
      GroupManager.showGroupMembers();
    }
  });

  document.getElementById('groupSettingsBtn')?.addEventListener('click', () => {
    if (GroupManager.currentGroupId) {
      GroupManager.showGroupSettings();
    }
  });

  // ===== 聊天记录侧边栏 =====
  document.getElementById('chatHistoryBtn')?.addEventListener('click', () => {
    toggleChatHistoryModal();
  });

  // ===== 语音录制按钮（桌面端点击切换，非长按） =====
  const voiceBtn = document.querySelector('.chat-input-toolbar .btn-icon[title="语音"]');
  if (voiceBtn) {
    voiceBtn.addEventListener('click', (e) => {
      e.preventDefault();
      VoiceManager.toggleRecording();
    });
  }

  // ===== 语音通话按钮 =====
  const callBtn = document.querySelector('.chat-header-actions .btn-icon[title="语音通话"]');
  if (callBtn) {
    callBtn.addEventListener('click', () => {
      if (ChatManager.currentFriendId && ChatManager.currentFriendInfo) {
        CallManager.startCall(
          ChatManager.currentFriendId,
          ChatManager.currentFriendInfo.nickname || '好友',
          ChatManager.currentFriendInfo.avatar || ''
        );
      } else {
        Utils.showToast('请先选择一个好友', 'warning');
      }
    });
  }

  // 初始化通话信令监听
  CallManager.init();

  // ===== 消息输入 =====
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');

  // @提及弹出框状态
  let atMentionActive = false;
  let atMentionPopup = null;
  let atMentionSelectedIdx = 0;
  let atMentionItems = [];
  let atMentionStartPos = -1; // 记录 @ 在输入框中的位置

  function closeAtMention() {
    atMentionActive = false;
    if (atMentionPopup) { atMentionPopup.remove(); atMentionPopup = null; }
    atMentionItems = [];
    atMentionSelectedIdx = 0;
    atMentionStartPos = -1;
  }

  async function showAtMentionPopup(filter) {
    if (!GroupManager.currentGroupId) { closeAtMention(); return; }
    // 懒加载：如果机器人列表为空，尝试加载
    if (!BotManager.groupBots || BotManager.groupBots.length === 0) {
        await BotManager.loadGroupBots(GroupManager.currentGroupId);
    }
    const bots = BotManager.groupBots || [];
    // 确保成员列表已加载
    const members = (GroupManager.members && GroupManager.members.length > 0)
        ? GroupManager.members.filter(m => m.userId !== Auth.getUserId())
        : [];
    let items = [];
    bots.forEach(b => items.push({ type: 'bot', id: b.id, name: b.name, avatar: b.avatar || BotManager.getDefaultBotAvatar(b.name) }));
    members.forEach(m => items.push({ type: 'member', id: m.userId, name: m.nickname, avatar: m.avatar || Utils.getAvatarUrl(null, 'user-' + m.userId) }));
    if (filter) {
      const f = filter.toLowerCase();
      items = items.filter(i => i.name.toLowerCase().includes(f));
    }
    if (items.length === 0) { closeAtMention(); return; }
    atMentionItems = items;
    atMentionSelectedIdx = 0;

    if (!atMentionPopup) {
      atMentionPopup = document.createElement('div');
      atMentionPopup.id = 'atMentionPopup';
      atMentionPopup.className = 'at-mention-popup';
      document.querySelector('.chat-input-area').appendChild(atMentionPopup);
    }
    renderAtMentionList();
    atMentionActive = true;
  }

  function renderAtMentionList() {
    if (!atMentionPopup) return;
    atMentionPopup.innerHTML = atMentionItems.map((item, i) => {
      const icon = item.type === 'bot' ? '🤖 ' : '';
      return `<div class="at-mention-item ${i === atMentionSelectedIdx ? 'active' : ''}" data-idx="${i}">
        <img src="${Utils.escapeHtml(item.avatar)}" class="avatar avatar-xs" onerror="this.src='${BotManager.getDefaultBotAvatar(item.name)}'">
        <span>${icon}${Utils.escapeHtml(item.name)}</span>
      </div>`;
    }).join('');
    atMentionPopup.querySelectorAll('.at-mention-item').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        selectAtMention(parseInt(el.dataset.idx));
      });
      // 选中项滚动到可视区域
      if (el.classList.contains('active')) {
        el.scrollIntoView({ block: 'nearest' });
      }
    });
  }

  function selectAtMention(idx) {
    const item = atMentionItems[idx];
    if (!item) return;
    const input = messageInput;
    const val = input.value;
    const startPos = atMentionStartPos >= 0 ? atMentionStartPos : val.lastIndexOf('@');
    if (startPos >= 0) {
      // 只替换 @query 部分，保留光标之后的文字
      const before = val.substring(0, startPos);
      const after = val.substring(input.selectionStart);
      input.value = before + '@' + item.name + ' ' + after;
    }
    closeAtMention();
    input.focus();
  }

  // 监听输入，将表情标记渲染为图片预览 + @提及检测
  let lastValue = '';
  messageInput.addEventListener('input', () => {
    const value = messageInput.value;
    // 检查是否包含表情标记
    if (value.includes('[emoji:') && value !== lastValue) {
      const displayValue = value.replace(/\[emoji:([^\]]+):([^\]]+)\]/g, '🖼️$1');
      console.log('[表情] 输入内容:', value);
    }
    lastValue = value;
    // @提及检测
    const cursorPos = messageInput.selectionStart;
    const textBeforeCursor = value.substring(0, cursorPos);
    const atMatch = textBeforeCursor.match(/@([^@\s]*)$/);
    if (atMatch && GroupManager.currentGroupId) {
      atMentionStartPos = cursorPos - atMatch[0].length; // 记录 @ 的位置
      showAtMentionPopup(atMatch[1]);
    } else {
      closeAtMention();
    }
  });

  // 聊天头部更多按钮（群聊：AI 机器人管理 / 好友：拉黑/删除）
  document.getElementById('chatMoreBtn')?.addEventListener('click', (e) => {
    if (GroupManager.currentGroupId) {
      GroupManager.showBotManager();
    } else {
      ChatManager.showChatMenu(e);
    }
  });

  // 修改发送逻辑：支持群聊和私聊
  function handleSendMessage() {
    if (GroupManager.currentGroupId) {
      GroupManager.sendGroupMessage();
    } else if (ChatManager.currentFriendId) {
      ChatManager.sendTextMessage();
    }
  }

  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      if (atMentionActive && atMentionItems.length > 0) {
        e.preventDefault();
        selectAtMention(atMentionSelectedIdx);
        return;
      }
      e.preventDefault();
      handleSendMessage();
    } else if (atMentionActive) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        atMentionSelectedIdx = (atMentionSelectedIdx + 1) % atMentionItems.length;
        renderAtMentionList();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        atMentionSelectedIdx = (atMentionSelectedIdx - 1 + atMentionItems.length) % atMentionItems.length;
        renderAtMentionList();
      } else if (e.key === 'Escape') {
        closeAtMention();
      }
    }
  });

  sendBtn.addEventListener('click', () => {
    handleSendMessage();
  });

  // ===== 图片和文件上传 =====
  // 图片上传按钮
  const imageUploadBtn = document.querySelector('button[title="图片"]');
  if (imageUploadBtn) {
    imageUploadBtn.addEventListener('click', () => {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.style.display = 'none';
      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // 判断当前是私聊还是群聊
        if (ChatManager.currentFriendId) {
          await ChatManager.sendImage(file);
        } else if (GroupManager.currentGroupId) {
          await GroupManager.sendGroupImage(file);
        } else {
          Utils.showToast('请先选择一个聊天对象', 'warning');
        }
      });
      document.body.appendChild(fileInput);
      fileInput.click();
      document.body.removeChild(fileInput);
    });
  }

  // 文件上传按钮
  const fileUploadBtn = document.querySelector('button[title="文件"]');
  if (fileUploadBtn) {
    fileUploadBtn.addEventListener('click', () => {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.style.display = 'none';
      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // 判断当前是私聊还是群聊
        if (ChatManager.currentFriendId) {
          await ChatManager.sendFile(file);
        } else if (GroupManager.currentGroupId) {
          await GroupManager.sendGroupFile(file);
        } else {
          Utils.showToast('请先选择一个聊天对象', 'warning');
        }
      });
      document.body.appendChild(fileInput);
      fileInput.click();
      document.body.removeChild(fileInput);
    });
  }

  messageInput.addEventListener('input', () => {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
  });

  // ===== 下拉菜单 =====
  function toggleProfileDropdown(el, event) {
    event.stopPropagation();
    const dropdown = el.querySelector('.dropdown');
    if (dropdown) {
      document.querySelectorAll('.dropdown').forEach(d => {
        if (d !== dropdown) d.classList.remove('active');
      });
      dropdown.classList.toggle('active');
    }
  }
  function toggleDropdown(btn, event) {
    event.stopPropagation();
    const dropdown = btn.closest('.dropdown');
    if (dropdown) dropdown.classList.toggle('active');
  }
  document.addEventListener('click', () => {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
  });

  // 公告展开/收起
  function toggleAnnouncement() {
    const body = document.getElementById('announcementBody');
    const arrow = document.getElementById('announcementArrow');
    const isOpen = body.style.display !== 'none';
    body.style.display = isOpen ? 'none' : '';
    arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
  }

  // 公告详情弹窗
  function showAnnouncementDetail(ann) {
    const overlay = document.createElement('div');
    overlay.className = 'announcement-detail-overlay';
    overlay.innerHTML = `
      <div class="announcement-detail-box">
        <div class="announcement-detail-header">
          <h3>${Utils.escapeHtml(ann.title)}</h3>
          <button class="btn-icon" onclick="closeAnnouncementDetail(this)">
            <i data-lucide="x" style="width:18px;height:18px;"></i>
          </button>
        </div>
        <div class="announcement-detail-body">${Utils.escapeHtml(ann.content || '暂无内容')}</div>
        <div class="announcement-detail-time">发布时间：${Utils.formatTime(ann.updateTime || ann.createTime)}</div>
      </div>
    `;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeAnnouncementDetail(overlay); });
    const escHandler = (e) => { if (e.key === 'Escape') { closeAnnouncementDetail(overlay); document.removeEventListener('keydown', escHandler); } };
    document.addEventListener('keydown', escHandler);
    document.body.appendChild(overlay);
    lucide.createIcons();
  }
  function closeAnnouncementDetail(el) {
    const overlay = el.closest('.announcement-detail-overlay');
    if (!overlay) return;
    overlay.classList.add('closing');
    overlay.addEventListener('animationend', () => overlay.remove(), { once: true });
  }

  // 加载群列表
  GroupManager.loadMyGroups();

  // 初始化 lucide 图标
  setTimeout(() => lucide.createIcons(), 100);

  // 当前搜索状态
  let currentSearchState = {
    keyword: '',
    startDate: '',
    endDate: '',
    messages: []
  };

  // ===== 聊天记录侧边栏功能 =====
  function toggleChatHistoryModal() {
    const modal = document.getElementById('chatHistoryModal');
    const isActive = modal.classList.contains('active');
    if (isActive) {
      Utils.closeModalAnimated(modal, () => {
        modal.classList.remove('active', 'closing');
      });
    } else {
      modal.classList.add('active');
      modal.style.display = ''; // 清除可能残留的 inline style
      setTimeout(() => {
        lucide.createIcons();
        loadAllChatHistory();
      }, 100);
    }
  }

  // 加载所有聊天记录（按时间倒序）
  function loadAllChatHistory() {
    const container = document.getElementById('chatHistoryMessages');
    container.innerHTML = '<div class="chat-history-empty"><p>加载中...</p></div>';
    
    let url = '';
    if (GroupManager.currentGroupId) {
      url = `/api/message/filter/group?groupId=${GroupManager.currentGroupId}`;
    } else if (ChatManager.currentFriendId) {
      url = `/api/message/filter/private?targetId=${ChatManager.currentFriendId}`;
    }
    
    if (!url) {
      container.innerHTML = '<div class="chat-history-empty"><p>请先选择一个聊天对象</p></div>';
      lucide.createIcons();
      return;
    }
    
    API.get(url).then(result => {
      if (result && result.code === 200) {
        const messages = (result.data || []).reverse();
        currentSearchState.messages = messages;
        currentSearchState.keyword = '';
        currentSearchState.startDate = '';
        currentSearchState.endDate = '';
        renderChatHistory(messages, '');
      } else {
        container.innerHTML = '<div class="chat-history-empty"><p>暂无聊天记录</p></div>';
        lucide.createIcons();
      }
    }).catch(err => {
      console.error('[加载] 错误:', err);
      container.innerHTML = '<div class="chat-history-empty"><p>加载失败</p></div>';
      lucide.createIcons();
    });
  }

  function searchChatHistory() {
    const keyword = document.getElementById('historyKeyword').value.trim();
    const startDate = document.getElementById('historyStartDate').value;
    const endDate = document.getElementById('historyEndDate').value;
    
    if (!keyword && !startDate && !endDate) {
      loadAllChatHistory();
      return;
    }
    
    const container = document.getElementById('chatHistoryMessages');
    container.innerHTML = '<div class="chat-history-empty"><p>搜索中...</p></div>';
    
    let url = '';
    if (GroupManager.currentGroupId) {
      if (keyword) {
        url = `/api/message/search/group?groupId=${GroupManager.currentGroupId}&keyword=${encodeURIComponent(keyword)}`;
      } else if (startDate || endDate) {
        url = `/api/message/filter/group?groupId=${GroupManager.currentGroupId}`;
        if (startDate) url += `&startTime=${startDate} 00:00:00`;
        if (endDate) url += `&endTime=${endDate} 23:59:59`;
      }
    } else if (ChatManager.currentFriendId) {
      if (keyword) {
        url = `/api/message/search/private?targetId=${ChatManager.currentFriendId}&keyword=${encodeURIComponent(keyword)}`;
      } else if (startDate || endDate) {
        url = `/api/message/filter/private?targetId=${ChatManager.currentFriendId}`;
        if (startDate) url += `&startTime=${startDate} 00:00:00`;
        if (endDate) url += `&endTime=${endDate} 23:59:59`;
      }
    }
    
    if (!url) {
      container.innerHTML = '<div class="chat-history-empty"><p>请先选择一个聊天对象</p></div>';
      lucide.createIcons();
      return;
    }
    
    API.get(url).then(result => {
      if (result && result.code === 200) {
        const messages = (result.data || []).reverse();
        currentSearchState.messages = messages;
        currentSearchState.keyword = keyword;
        currentSearchState.startDate = startDate;
        currentSearchState.endDate = endDate;
        renderChatHistory(messages, keyword);
      } else {
        container.innerHTML = '<div class="chat-history-empty"><p>搜索失败</p></div>';
        lucide.createIcons();
      }
    }).catch(err => {
      console.error('[搜索] 错误:', err);
      container.innerHTML = '<div class="chat-history-empty"><p>搜索出错，请稍后重试</p></div>';
      lucide.createIcons();
    });
  }

  function resetChatHistorySearch() {
    document.getElementById('historyKeyword').value = '';
    document.getElementById('historyStartDate').value = '';
    document.getElementById('historyEndDate').value = '';
    // 重置后自动加载所有聊天记录
    loadAllChatHistory();
  }

  function renderChatHistory(messages, keyword = '') {
    const container = document.getElementById('chatHistoryMessages');
    
    if (!messages || messages.length === 0) {
      container.innerHTML = '<div class="chat-history-empty"><p>暂无聊天记录</p></div>';
      lucide.createIcons();
      return;
    }
    
    let html = '';
    messages.forEach(msg => {
      const isBot = !!msg.botId;
      const avatarSrc = isBot
        ? (msg.botAvatar || (typeof BotManager !== 'undefined' ? BotManager.getDefaultBotAvatar(msg.botName || 'bot') : msg.senderAvatar))
        : Utils.getAvatarUrl(msg.senderAvatar, `user-${msg.senderId}`);
      const senderName = isBot
        ? `🤖 ${msg.botName || msg.senderNickname || 'AI'}`
        : Utils.escapeHtml(msg.senderNickname);
      const time = Utils.formatMessageTime(msg.createTime);
      let contentHtml = '';
      
      if (msg.messageType === 1) {
        // 先解码 URL 编码的 emoji 字符
        let fileUrl = msg.fileUrl;
        if (fileUrl && fileUrl.startsWith('http://localhost:8080/')) {
          try {
            fileUrl = decodeURIComponent(fileUrl.replace('http://localhost:8080/', ''));
          } catch (e) {
            console.error('解码失败:', e);
          }
        }
        
        if (fileUrl && fileUrl.length <= 10) {
          contentHtml = `<span style="font-size: 28px;vertical-align:middle;">${fileUrl}</span>`;
        } else if (fileUrl) {
          contentHtml = `<img src="${msg.fileUrl}" alt="图片" class="chat-history-image" onclick="showChatImagePreview('${msg.fileUrl}')">`;
        } else {
          contentHtml = `<span class="chat-history-text">${Utils.escapeHtml(msg.content)}</span>`;
        }
      } else {
        contentHtml = `<span class="chat-history-text">${Utils.escapeHtml(msg.content)}</span>`;
      }
      
      // 关键词高亮
      if (keyword && msg.messageType === 0) {
        contentHtml = contentHtml.replace(new RegExp(keyword, 'gi'), match => `<span class="chat-history-text highlight">${match}</span>`);
      }
      
      html += `
        <div class="chat-history-item">
          <img src="${avatarSrc}" alt="头像" class="avatar avatar-sm chat-history-avatar" onerror="this.src='${typeof BotManager !== 'undefined' ? BotManager.getDefaultBotAvatar('bot') : avatarSrc}'">
          <div class="chat-history-content">
            ${contentHtml}
            <div class="chat-history-meta">
              <span>${senderName}</span>
              <span class="chat-history-time">${time}</span>
            </div>
          </div>
        </div>
      `;
    });
    
    container.innerHTML = html;
    lucide.createIcons();
  }

  // 显示图片预览（用于聊天记录窗口）
  function showChatImagePreview(imageUrl) {
    GroupManager.showImagePreview(imageUrl);
  }

  function exportChatHistory(format) {
    // 检查是否有搜索结果
    if (!currentSearchState.messages || currentSearchState.messages.length === 0) {
      Utils.showToast('暂无可导出的聊天记录', 'warning');
      return;
    }
    
    // 生成文件名
    const now = new Date();
    const timestamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
    const filename = `chat_history_${timestamp}.${format}`;
    
    // 构建导出内容
    let content = '';
    if (format === 'txt') {
      content = buildTxtContent(currentSearchState.messages);
    } else if (format === 'csv') {
      content = buildCsvContent(currentSearchState.messages);
    }
    
    // 创建下载
    downloadFile(content, filename, format === 'csv' ? 'text/csv' : 'text/plain');
  }

  // 构建 TXT 格式内容
  function buildTxtContent(messages) {
    let sb = '聊天记录导出\n';
    sb += `导出时间：${new Date().toLocaleString('zh-CN')}\n`;
    sb += '========================================\n\n';
    
    messages.forEach(msg => {
      const time = new Date(msg.createTime).toLocaleString('zh-CN');
      const sender = msg.botId ? `🤖 ${msg.botName || 'AI'}` : (msg.senderNickname || '未知用户');
      const content = msg.content;
      sb += `[${time}] ${sender}: ${content}\n`;
    });
    
    return sb;
  }

  // 构建 CSV 格式内容
  function buildCsvContent(messages) {
    let csv = '时间，发送者，内容，类型\n';
    
    messages.forEach(msg => {
      const time = new Date(msg.createTime).toLocaleString('zh-CN');
      const sender = msg.botId ? `🤖 ${msg.botName || 'AI'}` : (msg.senderNickname || '未知用户');
      let content = msg.content || '';
      const type = msg.messageType === 1 ? '图片' : (msg.messageType === 2 ? '文件' : '文字');
      
      // CSV 转义：如果包含逗号、双引号或换行符，用双引号包裹
      if (content.includes(',') || content.includes('"') || content.includes('\n')) {
        content = '"' + content.replace(/"/g, '""') + '"';
      }
      
      csv += `${time},${sender},${content},${type}\n`;
    });
    
    return csv;
  }

  // 下载文件
  function downloadFile(content, filename, mimeType) {
    // 添加 UTF-8 BOM 头，防止中文乱码
    const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
    const blob = new Blob([bom, content], { type: mimeType + ';charset=utf-8' });
    
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(link.href);
  }

  // ===== 粘贴图片发送 =====
  const pasteImageModal = document.getElementById('pasteImageModal');
  const pasteImagePreview = document.getElementById('pasteImagePreview');
  const pasteImageSize = document.getElementById('pasteImageSize');
  const pasteImageConfirm = document.getElementById('pasteImageConfirm');
  const pasteImageCancel = document.getElementById('pasteImageCancel');
  let pendingPasteFile = null;

  // 监听输入框粘贴事件
  messageInput.addEventListener('paste', async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;

    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (!file) continue;

        // 显示预览
        pendingPasteFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => {
          pasteImagePreview.src = ev.target.result;
          pasteImageSize.textContent = Utils.formatFileSize(file.size);
          pasteImageModal.style.display = 'flex';
        };
        reader.readAsDataURL(file);
        break;
      }
    }
  });

  // 确认发送粘贴的图片
  pasteImageConfirm.addEventListener('click', async () => {
    if (!pendingPasteFile) return;
    const file = pendingPasteFile;
    closePasteImageModal();

    if (GroupManager.currentGroupId) {
      await GroupManager.sendGroupImage(file);
    } else if (ChatManager.currentFriendId) {
      await ChatManager.sendImage(file);
    } else {
      Utils.showToast('请先选择一个聊天对象', 'warning');
    }
  });

  // 取消粘贴图片
  pasteImageCancel.addEventListener('click', closePasteImageModal);
  document.getElementById('pasteImageOverlay').addEventListener('click', closePasteImageModal);

  function closePasteImageModal() {
    pasteImageModal.style.display = 'none';
    pasteImagePreview.src = '';
    pendingPasteFile = null;
  }

  // 粘贴图片模态框支持 Enter 发送（在 document 层捕获，优先于输入框的 Enter）
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing && pasteImageModal.style.display === 'flex') {
      e.preventDefault();
      e.stopPropagation();
      pasteImageConfirm.click();
    }
  }, true); // 捕获阶段，确保在 messageInput 的 keydown 之前拦截

  // ===== 移动端侧边栏切换 =====
  function showMobileSidebar() {
    const sidebar = document.querySelector('.app-sidebar');
    const backdrop = document.querySelector('.sidebar-backdrop');
    sidebar.classList.remove('sidebar-has-chat');
    sidebar.classList.add('sidebar-open');
    backdrop.classList.remove('active');
  }

  function hideMobileSidebar() {
    const sidebar = document.querySelector('.app-sidebar');
    const backdrop = document.querySelector('.sidebar-backdrop');
    sidebar.classList.remove('sidebar-open');
    backdrop.classList.remove('active');
  }

  // 选择会话后自动隐藏侧边栏（切到聊天界面）
  document.addEventListener('click', function(e) {
    const listItem = e.target.closest('.list-item');
    if (listItem && window.innerWidth <= 768) {
      hideMobileSidebar();
    }
  });

  // 窄屏默认显示联系人列表（隐藏空聊天界面）
  if (window.innerWidth <= 768) {
    showMobileSidebar();
  }

  // 窗口大小变化时，宽屏自动恢复侧边栏
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768) {
      const sidebar = document.querySelector('.app-sidebar');
      const backdrop = document.querySelector('.sidebar-backdrop');
      sidebar.classList.remove('sidebar-open', 'sidebar-has-chat');
      backdrop.classList.remove('active');
    }
  });
</script>
