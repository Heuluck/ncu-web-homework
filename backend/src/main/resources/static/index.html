<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线聊天系统</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="app-sidebar">
      <!-- 用户信息头部 -->
      <div class="sidebar-header">
        <div class="sidebar-profile">
          <div class="avatar-wrapper">
            <img id="myAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="头像" class="avatar avatar-sm">
            <span id="myStatus" class="status-indicator online"></span>
          </div>
          <div class="sidebar-profile-info">
            <span id="myName" class="sidebar-profile-name">用户名</span>
          </div>
          <div class="dropdown">
            <button class="btn-icon" onclick="toggleDropdown(this)">
              <i data-lucide="chevron-down" style="width: 16px; height: 16px;"></i>
            </button>
            <div class="dropdown-menu">
              <div class="dropdown-item" onclick="location.href='/profile.html'">
                <i data-lucide="user" style="width: 16px; height: 16px;"></i>
                个人资料
              </div>
              <div class="dropdown-divider"></div>
              <div class="dropdown-item" onclick="Auth.logout()">
                <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
                退出登录
              </div>
            </div>
          </div>
        </div>
        <button class="btn-icon" title="新建聊天">
          <i data-lucide="edit"></i>
        </button>
      </div>

      <!-- 搜索栏 -->
      <div class="sidebar-search">
        <div class="search-wrapper">
          <i data-lucide="search" style="width: 16px; height: 16px;"></i>
          <input type="text" class="input-control" placeholder="搜索联系人或群组...">
        </div>
      </div>

      <!-- 标签页导航 -->
      <div class="sidebar-nav">
        <div class="nav-item active" data-tab="recent">最近</div>
        <div class="nav-item" data-tab="friends">好友</div>
        <div class="nav-item" data-tab="groups">群聊</div>
      </div>

      <!-- 列表内容区（各成员填充） -->
      <div class="sidebar-content" id="sidebarContent">
        <!-- B 负责：会话列表 -->
        <div id="conversationList" class="tab-content active">
          <div class="list-group-title">加载中...</div>
        </div>
        
        <!-- D 负责：好友列表 -->
        <div id="friendList" class="tab-content" style="display: none;">
          <!-- 好友列表由 D 开发 -->
        </div>
        
        <!-- C 负责：群聊列表 -->
        <div id="groupList" class="tab-content" style="display: none;">
          <!-- 群聊列表由 C 开发 -->
        </div>
      </div>
    </aside>

    <!-- 聊天区域 -->
    <main class="chat-area">
      <!-- 聊天头部 -->
      <div class="chat-header" id="chatHeader" style="display: none;">
        <div class="chat-header-info">
          <div class="avatar-wrapper">
            <img id="chatAvatar" src="" alt="" class="avatar avatar-md">
            <span id="chatStatus" class="status-indicator"></span>
          </div>
          <div class="chat-header-details">
            <span id="chatName" class="chat-header-name"></span>
            <span id="chatStatusText" class="chat-header-status"></span>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="btn-icon" title="语音通话">
            <i data-lucide="phone"></i>
          </button>
          <button class="btn-icon" title="查看更多">
            <i data-lucide="more-vertical"></i>
          </button>
        </div>
      </div>

      <!-- 消息区域（B 负责） -->
      <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
          <div class="empty-state-icon">
            <i data-lucide="message-square" style="width: 64px; height: 64px;"></i>
          </div>
          <div class="empty-state-title">选择一个会话开始聊天</div>
          <div class="empty-state-text">从左侧列表选择联系人或群组</div>
        </div>
      </div>

      <!-- 输入区域（B 负责） -->
      <div class="chat-input-area" id="chatInputArea" style="display: none;">
        <div class="chat-input-toolbar">
          <button class="btn-icon" title="表情">
            <i data-lucide="smile"></i>
          </button>
          <button class="btn-icon" title="图片">
            <i data-lucide="image"></i>
          </button>
          <button class="btn-icon" title="文件">
            <i data-lucide="paperclip"></i>
          </button>
          <button class="btn-icon" title="语音">
            <i data-lucide="mic"></i>
          </button>
        </div>
        <div class="chat-input-box">
          <textarea id="messageInput" class="chat-input-field" placeholder="输入消息..." rows="1"></textarea>
          <button id="sendBtn" class="btn btn-primary chat-send-btn">
            <i data-lucide="send" style="width: 16px; height: 16px;"></i>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/websocket.js"></script>
  <script>
    // 认证检查
    if (!Auth.checkAuth()) location.href = '/login.html';
    
    // 初始化
    const user = Auth.getUser();
    document.getElementById('myName').textContent = user?.nickname || user?.username || '用户';
    if (user?.avatar) {
      document.getElementById('myAvatar').src = user.avatar;
    }
    
    lucide.createIcons();

    // 标签页切换
    document.querySelectorAll('.nav-item').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const tabName = tab.dataset.tab;
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(tabName === 'recent' ? 'conversationList' : 
                                tabName === 'friends' ? 'friendList' : 'groupList').style.display = 'block';
      });
    });

    // 下拉菜单
    function toggleDropdown(btn) {
      const dropdown = btn.closest('.dropdown');
      dropdown.classList.toggle('active');
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
      }
    });

    // WebSocket 连接
    WS.connect(Auth.getToken());
    WS.on('connected', () => console.log('WebSocket 已连接'));
    WS.on('message', (data) => {
      // B 负责实现消息接收渲染
      console.log('收到消息:', data);
    });
  </script>
</body>
</html>
