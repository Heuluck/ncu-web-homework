<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 在线聊天系统</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-header-logo">
          <i data-lucide="message-square-more"></i>
        </div>
        <h1 class="auth-header-title">欢迎回来</h1>
        <p class="auth-header-subtitle">登录您的账号以继续</p>
      </div>

      <div class="card auth-card">
        <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
        <form class="auth-form" id="loginForm">
          <div class="input-group">
            <label class="input-label" for="username">用户名</label>
            <input type="text" id="username" class="input-control" placeholder="输入用户名" required>
          </div>
          
          <div class="input-group">
            <label class="input-label" for="password">密码</label>
            <input type="password" id="password" class="input-control" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
            登录
          </button>
        </form>
      </div>

      <div class="auth-footer">
        还没有账号？ <a href="/register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    lucide.createIcons();

    // 已登录则跳转
    if (Auth.isLoggedIn()) {
      window.location.href = '/index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const submitBtn = e.target.querySelector('button[type="submit"]');
      
      errorMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中...';
      
      const result = await API.post('/api/auth/login', { username, password });
      
      if (result && result.code === 200) {
        Auth.setToken(result.data.token);
        Auth.setUser(result.data.user);
        window.location.href = '/index.html';
      } else {
        errorMsg.textContent = result?.message || '登录失败';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '登录';
      }
    });
  </script>
</body>
</html>
