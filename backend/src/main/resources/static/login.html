<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 在线聊天系统</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-header-logo">
          <i data-lucide="message-square-more"></i>
        </div>
        <h1 class="auth-header-title">欢迎回来</h1>
        <p class="auth-header-subtitle">登录您的账号以继续</p>
      </div>

      <div class="card auth-card">
        <form class="auth-form" id="loginForm">
          <div class="input-group">
            <label class="input-label" for="username">用户名</label>
            <input type="text" id="username" class="input-control" placeholder="输入用户名" required>
          </div>
          
          <div class="input-group">
            <label class="input-label" for="password">密码</label>
            <input type="password" id="password" class="input-control" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
            登录
          </button>
        </form>
      </div>

      <div class="auth-footer">
        还没有账号？ <a href="/register.html">立即注册</a>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
    // 占位逻辑
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
