<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>语音通话 - NCU Chat</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body{margin:0;background:#000;overflow:hidden}
</style>
</head>
<body>
<div id="call-container"></div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/websocket.js"></script>
<script src="js/call.js"></script>
<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');
    const userId = params.get('userId');
    const userName = params.get('userName');
    const userAvatar = params.get('userAvatar');

    if (!Auth.isLoggedIn()) {
      window.location.href = '/login.html';
      return;
    }

    if (action === 'call' && userId) {
      // 被动等待：由 CallManager 监听信令
      CallManager.init();
    }

    // 主动呼叫
    if (action === 'start' && userId) {
      WebSocketManager.onConnected(() => {
        CallManager.startCall(userId, userName || '用户', userAvatar || '');
      });
      if (WebSocketManager.connected) {
        CallManager.startCall(userId, userName || '用户', userAvatar || '');
      } else {
        WebSocketManager.connect();
      }
    }

    lucide.createIcons();
  })();
</script>
</body>
</html>
